<section id="posts-topics">
	
	<h1 class="section-title"><a href="{{ site.url | append: site.baseurl | append: '/topics/' }}" title="Go to the topics page">Explore topics</a></h1>

	{% assign topics = site.topics %}

	<ul>
		{% for post in topics %}
		<li>
			<article>
				<h2>
					<a href="{{ site.url | append: site.baseurl | append: post.url }}" title="Find out more about {{ post.title }}">
						{{ post.title }}
					</a>
          <p class="post-metadata">{% if post.excerpt %}{{ post.excerpt }}{% endif %}</p>
				</h2>
			</article>
		</li>
		{% endfor %}
	</ul>
	
</section>
